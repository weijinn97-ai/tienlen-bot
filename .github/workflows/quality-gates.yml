name: Quality Gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  unit-and-governance:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: python -m pip install -r requirements-runtime.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate module registry
        run: python tools/check_module_governance.py

      - name: Collect changed files
        if: github.event_name == 'pull_request'
        shell: powershell
        run: |
          $files = @(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          [IO.File]::WriteAllLines("changed-files.txt", $files)

      - name: Enforce locked modules
        if: github.event_name == 'pull_request'
        shell: powershell
        env:
          LOCK_OVERRIDE_APPROVED: ${{ contains(github.event.pull_request.labels.*.name, 'locked-change-approved') }}
        run: |
          if ($env:LOCK_OVERRIDE_APPROVED -eq "true") {
            python tools/check_module_governance.py --changed-files changed-files.txt --allow-locked-changes
          } else {
            python tools/check_module_governance.py --changed-files changed-files.txt
          }
